name: voqal_flutter
description: "Voqal — voice-first assistant SDK for Flutter (thin wrapper over the native iOS/Android Voqal SDKs)."
version: 1.3.2
homepage: https://voqal.ai
repository: https://github.com/VoqalAI/voqal-flutter

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: ai.voqal.voqal_flutter
        pluginClass: VoqalFlutterPlugin
      ios:
        pluginClass: VoqalFlutterPlugin
